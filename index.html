<style>
        :root {
            --bg-color: #f7f9fa;       /* Gris très clair minimaliste coréen */
            --card-bg: #ffffff;        /* Blanc épuré */
            --primary: #3182f6;        /* Bleu Toss/K-tech moderne et dynamique */
            --accent: #ff4b5c;         /* Rouge corail contemporain */
            --text-main: #191f28;      /* Presque noir (style typo moderne) */
            --text-sub: #8b95a1;       /* Gris texte secondaire */
            --border-color: #e5e8eb;   /* Bordures ultra-fines et discrètes */
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Malgun Gothic", "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .app-container {
            width: 100%;
            max-width: 400px;
            background: var(--card-bg);
            border-radius: 24px; /* Arrondis plus doux, très tendance PWA */
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
            padding: 24px;
            box-sizing: border-box;
        }

        h2 {
            margin-top: 0;
            margin-bottom: 25px;
            text-align: center;
            color: var(--text-main);
            font-size: 1.3rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .section {
            border: none;
            border-radius: 18px;
            padding: 18px;
            margin-bottom: 20px;
            background: #f9fafb; /* Fond de section contrasté mais doux */
        }

        .section-title {
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-sub);
            margin-bottom: 14px;
            letter-spacing: 0.5px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group:last-child {
            margin-bottom: 0;
        }

        label {
            display: block;
            font-size: 0.85rem;
            margin-bottom: 6px;
            font-weight: 600;
            color: var(--text-main);
        }

        input[type="number"] {
            width: 100%;
            padding: 14px;
            border: 1px solid var(--border-color);
            background-color: #ffffff;
            border-radius: 12px;
            font-size: 1.15rem;
            font-weight: 600;
            color: var(--text-main);
            box-sizing: border-box;
            transition: all 0.2s ease;
            -moz-appearance: textfield;
        }
        
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(49, 130, 246, 0.15); /* Effet de focus moderne */
        }

        .btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 0.9rem;
            cursor: pointer;
            width: 100%;
            font-weight: 600;
            transition: background 0.2s, transform 0.1s;
        }

        .btn:active {
            background-color: #1b64da;
            transform: scale(0.98); /* Petit effet d'enfoncement premium au clic */
        }

        .result-box {
            background: rgba(49, 130, 246, 0.06); /* Léger voile bleu translucide */
            border: 1px solid rgba(49, 130, 246, 0.2);
            border-radius: 12px;
            padding: 18px;
            text-align: center;
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--primary);
            margin-top: 10px;
            letter-spacing: -0.5px;
        }

        .status {
            font-size: 0.75rem;
            color: var(--text-sub);
            text-align: center;
            margin-top: 8px;
            font-weight: 500;
        }
    </style>
