    <style>
        :root {
            --bg-color: #f4f6f9;
            --card-bg: #ffffff;
            --primary: #0047a0; /* Bleu drapeau coréen */
            --accent: #cd2e3a;  /* Rouge drapeau coréen */
            --text: #333333;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .app-container {
            width: 100%;
            max-width: 400px;
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            padding: 20px;
            box-sizing: border-box;
        }

        h2 {
            margin-top: 0;
            text-align: center;
            color: var(--primary);
            font-size: 1.4rem;
        }

        .section {
            border: 1px solid #eef2f5;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            background: #fafbfc;
        }

        .section-title {
            font-size: 0.9rem;
            font-weight: bold;
            text-transform: uppercase;
            color: #777;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group:last-child {
            margin-bottom: 0;
        }

        label {
            display: block;
            font-size: 0.85rem;
            margin-bottom: 5px;
            font-weight: 500;
        }

        input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 1.1rem;
            box-sizing: border-box;
            transition: border-color 0.2s;
            -moz-appearance: textfield;
        }
        
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 0.85rem;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            transition: background 0.2s;
        }

        .btn:active {
            background-color: #003370;
        }

        .result-box {
            background: #eef5fc;
            border: 2px dashed var(--primary);
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--primary);
            margin-top: 10px;
        }

        .status {
            font-size: 0.75rem;
            color: #666;
            text-align: center;
            margin-top: 5px;
        }
    </style>
</head>
<body>

<div class="app-container">
    <h2>🇰🇷 Convertisseur KRW ➔ EUR 🇪🇺</h2>

    <div class="section">
        <div class="section-title">💸 Utilisation</div>
        <div class="input-group">
            <label for="krwInput">Prix en Wons (₩)</label>
            <input type="number" id="krwInput" placeholder="Ex: 10000" inputmode="numeric">
        </div>
        <div class="result-box" id="eurResult">0.00 €</div>
    </div>

    <div class="section">
        <div class="section-title">⚙️ Paramétrage</div>
        
        <div class="input-group" style="margin-bottom: 12px;">
            <button class="btn" id="fetchRateBtn">🔄 Obtenir le taux en temps réel</button>
            <div class="status" id="apiStatus">Prêt</div>
        </div>

        <div class="input-group">
            <label for="rateInput">Taux (1 ₩ = ... €)</label>
            <input type="number" id="rateInput" step="0.00000001" placeholder="Ex: 0.00067">
        </div>
    </div>
</div>

<script>
    const krwInput = document.getElementById('krwInput');
    const rateInput = document.getElementById('rateInput');
    const eurResult = document.getElementById('eurResult');
    const fetchRateBtn = document.getElementById('fetchRateBtn');
    const apiStatus = document.getElementById('apiStatus');

    let currentRate = localStorage.getItem('savedRate') || 0.00067;
    rateInput.value = currentRate;

    function convert() {
        const krw = parseFloat(krwInput.value) || 0;
        const rate = parseFloat(rateInput.value) || 0;
        const result = krw * rate;
        eurResult.textContent = result.toLocaleString('fr-FR', { style: 'currency', currency: 'EUR' });
    }

    krwInput.addEventListener('input', convert);
    rateInput.addEventListener('input', () => {
        localStorage.setItem('savedRate', rateInput.value);
        convert();
    });

    async function fetchLiveRate() {
        apiStatus.textContent = "Mise à jour...";
        apiStatus.style.color = "orange";
        
        try {
            const response = await fetch('https://api.frankfurter.dev/v1/latest?from=KRW&to=EUR');
            if (!response.ok) throw new Error();
            
            const data = await response.json();
            const liveRate = data.rates.EUR;
            
            rateInput.value = liveRate;
            localStorage.setItem('savedRate', liveRate);
            
            apiStatus.textContent = "Taux mis à jour avec succès !";
            apiStatus.style.color = "green";
            
            convert();
        } catch (error) {
            apiStatus.textContent = "Erreur de connexion (mode manuel conservé)";
            apiStatus.style.color = "red";
        }
    }

    fetchRateBtn.addEventListener('click', fetchLiveRate);
    fetchLiveRate();
</script>

</body>
</html>
