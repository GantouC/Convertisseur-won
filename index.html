<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Convertisseur ₩ / €</title>

    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxODAgMTgwIj4KICA8cmVjdCB3aWR0aD0iMTgwIiBoZWlnaHQ9IjE4MCIgcng9IjQwIiBmaWxsPSIjZjRmNmg5Ii8+CiAgPHRleHQgeD0iOTAiIHk9IjEzMCIgZm9udC1mYW1pbHk9ImFyaWFsIiBmb250LXNpemU9IjEyMCIgZmlsbD0iIzAwNDdhMCIgdGV4dC1hbmNob3I9Im1pZGRsZSI+4oKpPC90ZXh0Pgo8L3N2Zz4=">

    <style>
        :root {
            --bg-color: #f7f9fa;       /* Gris très clair minimaliste coréen */
            --card-bg: #ffffff;        /* Blanc épuré */
            --primary: #3182f6;        /* Bleu Toss/K-tech moderne et dynamique */
            --accent: #ff4b5c;         /* Rouge corail contemporain */
            --text-main: #191f28;      /* Presque noir (style typo moderne) */
            --text-sub: #8b95a1;       /* Gris texte secondaire */
            --border-color: #e5e8eb;   /* Bordures ultra-fines et discrètes */
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Malgun Gothic", "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .app-container {
            width: 100%;
            max-width: 400px;
            background: var(--card-bg);
            border-radius: 24px; /* Arrondis plus doux, très tendance PWA */
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
            padding: 24px;
            box-sizing: border-box;
        }

        h2 {
            margin-top: 0;
            margin-bottom: 25px;
            text-align: center;
            color: var(--text-main);
            font-size: 1.3rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .section {
            border: none;
            border-radius: 18px;
            padding: 18px;
            margin-bottom: 20px;
            background: #f9fafb; /* Fond de section contrasté mais doux */
        }

        .section-title {
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-sub);
            margin-bottom: 14px;
            letter-spacing: 0.5px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group:last-child {
            margin-bottom: 0;
        }

        label {
            display: block;
            font-size: 0.85rem;
            margin-bottom: 6px;
            font-weight: 600;
            color: var(--text-main);
        }

        input[type="number"] {
            width: 100%;
            padding: 14px;
            border: 1px solid var(--border-color);
            background-color: #ffffff;
            border-radius: 12px;
            font-size: 1.15rem;
            font-weight: 600;
            color: var(--text-main);
            box-sizing: border-box;
            transition: all 0.2s ease;
            -moz-appearance: textfield;
        }
        
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(49, 130, 246, 0.15); /* Effet de focus moderne */
        }

        .btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 0.9rem;
            cursor: pointer;
            width: 100%;
            font-weight: 600;
            transition: background 0.2s, transform 0.1s;
        }

        .btn:active {
            background-color: #1b64da;
            transform: scale(0.98); /* Petit effet d'enfoncement premium au clic */
        }

        .result-box {
            background: rgba(49, 130, 246, 0.06); /* Léger voile bleu translucide */
            border: 1px solid rgba(49, 130, 246, 0.2);
            border-radius: 12px;
            padding: 18px;
            text-align: center;
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--primary);
            margin-top: 10px;
            letter-spacing: -0.5px;
        }

        .status {
            font-size: 0.75rem;
            color: var(--text-sub);
            text-align: center;
            margin-top: 8px;
            font-weight: 500;
        }
    </style>
</head>
<body>

<div class="app-container">
    <h2>🇰🇷 Convertisseur KRW ➔ EUR 🇪🇺</h2>

    <div class="section">
        <div class="section-title">💸 Utilisation</div>
        <div class="input-group">
            <label for="krwInput">Prix en Wons (₩)</label>
            <input type="number" id="krwInput" placeholder="Ex: 10000" inputmode="numeric">
        </div>
        <div class="result-box" id="eurResult">0.00 €</div>
    </div>

    <div class="section">
        <div class="section-title">⚙️ Paramétrage</div>
        
        <div class="input-group" style="margin-bottom: 12px;">
            <button class="btn" id="fetchRateBtn">🔄 Obtenir le taux en temps réel</button>
            <div class="status" id="apiStatus">Prêt</div>
        </div>

        <div class="input-group">
            <label for="rateInput">Taux (1 ₩ = ... €)</label>
            <input type="number" id="rateInput" step="0.00000001" placeholder="Ex: 0.00067">
        </div>
    </div>
</div>

<script>
    const krwInput = document.getElementById('krwInput');
    const rateInput = document.getElementById('rateInput');
    const eurResult = document.getElementById('eurResult');
    const fetchRateBtn = document.getElementById('fetchRateBtn');
    const apiStatus = document.getElementById('apiStatus');

    let currentRate = localStorage.getItem('savedRate') || 0.00067;
    rateInput.value = currentRate;

    function convert() {
        const krw = parseFloat(krwInput.value) || 0;
        const rate = parseFloat(rateInput.value) || 0;
        const result = krw * rate;
        eurResult.textContent = result.toLocaleString('fr-FR', { style: 'currency', currency: 'EUR' });
    }

    krwInput.addEventListener('input', convert);
    rateInput.addEventListener('input', () => {
        localStorage.setItem('savedRate', rateInput.value);
        convert();
    });

    async function fetchLiveRate() {
        apiStatus.textContent = "Mise à jour...";
        apiStatus.style.color = "orange";
        
        try {
            const response = await fetch('https://api.frankfurter.dev/v1/latest?from=KRW&to=EUR');
            if (!response.ok) throw new Error();
            
            const data = await response.json();
            const liveRate = data.rates.EUR;
            
            rateInput.value = liveRate;
            localStorage.setItem('savedRate', liveRate);
            
            apiStatus.textContent = "Taux mis à jour avec succès !";
            apiStatus.style.color = "green";
            
            convert();
        } catch (error) {
            apiStatus.textContent = "Erreur de connexion (mode manuel conservé)";
            apiStatus.style.color = "red";
        }
    }

    fetchRateBtn.addEventListener('click', fetchLiveRate);
    fetchLiveRate();
</script>

</body>
</html>
